[package]
name = "agent-browser-wasm"
version = "0.27.3"
edition = "2021"
description = "Run agent-browser in a browser with a supplied CDP transport"
license = "Apache-2.0"
repository = "https://github.com/olimsaidov/agent-browser"
publish = false
build = "build.rs"

[lib]
crate-type = ["cdylib"]

[dependencies]
base64 = "0.22"
dirs = "5.0"
js-sys = "0.3"
getrandom = { version = "0.2", features = ["js"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false
