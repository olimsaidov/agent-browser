name: Publish WASM Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run all release steps without publishing to npm
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency: publish-wasm-${{ github.ref }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @olimsaidov/agent-browser-wasm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --dir packages/wasm-core build

      - name: Check package contents
        working-directory: packages/wasm-core/pkg
        run: npm pack --dry-run --json

      - name: Check npm version
        id: npm_version
        working-directory: packages/wasm-core/pkg
        run: |
          version=$(node -p "require('./package.json').version")
          published=$(npm view "@olimsaidov/agent-browser-wasm@$version" version --registry=https://registry.npmjs.org/ 2>/dev/null || true)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run completed for @olimsaidov/agent-browser-wasm@${{ steps.npm_version.outputs.version }}."
          if [ -n "${{ steps.npm_version.outputs.published }}" ]; then
            echo "Version is already published; a real publish run would stop before npm publish."
          else
            echo "Version is not published; a real publish run would publish it."
          fi

      - name: Stop if version exists
        if: ${{ !inputs.dry_run && steps.npm_version.outputs.published != '' }}
        run: |
          echo "::error::@olimsaidov/agent-browser-wasm@${{ steps.npm_version.outputs.version }} is already published"
          exit 1

      - name: Publish
        if: ${{ !inputs.dry_run && steps.npm_version.outputs.published == '' }}
        working-directory: packages/wasm-core/pkg
        run: npm publish --access public
